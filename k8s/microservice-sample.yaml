---
# Example 1 — Spring PetClinic (Thymeleaf UI, H2 in-memory database)
#
# Image : docker.io/springcommunity/spring-petclinic  (port 8080)
# UI    : http://<host>/  — full Thymeleaf web interface
# DB    : H2 in-memory — no database spec needed, ideal for a quick demo.
#
# NOTE: Spring Boot Actuator's Kubernetes probe endpoints (/actuator/health/liveness
# and /actuator/health/readiness) must be explicitly enabled via env vars.
# Without the MANAGEMENT_* vars below those paths return 404.
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: petclinic
  namespace: default
spec:
  image: docker.io/springcommunity/spring-petclinic:latest
  replicas: 1
  containerPort: 8080
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

  config:
    MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:   "true"
    MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:  "true"

---
# Example 2 — Spring PetClinic (Thymeleaf UI) + operator-managed PostgreSQL
#
# The operator automatically:
#   1. Generates a random password → Secret   "petclinic-prod-db-secret"
#   2. Creates headless Service               "petclinic-prod-db-headless"
#   3. Creates ClusterIP Service              "petclinic-prod-db"
#   4. Creates StatefulSet + PVC             "petclinic-prod-db"
#   5. Injects the Secret into the app Deployment (envFrom) so Spring Boot
#      reads these automatically:
#        SPRING_DATASOURCE_URL      = jdbc:postgresql://petclinic-prod-db:5432/petclinicdb
#        SPRING_DATASOURCE_USERNAME = petclinic
#        SPRING_DATASOURCE_PASSWORD = <auto-generated, 32-char random>
#
# No manual "kubectl create secret" — ever.
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: petclinic-prod
  namespace: production
spec:
  image: docker.io/springcommunity/spring-petclinic:latest
  replicas: 2
  containerPort: 8080
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

  # Operator-provisioned PostgreSQL
  database:
    image: docker.io/postgres:15-alpine
    databaseName: petclinicdb
    username: petclinic
    storageSize: 5Gi
    # storageClass: gp3   # AWS; "standard" for GKE; omit to use cluster default

  config:
    # Enable Kubernetes probe endpoints
    MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:   "true"
    MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:  "true"
    # Spring PetClinic postgres profile — datasource vars come from the auto-generated Secret
    SPRING_PROFILES_ACTIVE: postgres
    SPRING_JPA_OPEN_IN_VIEW: "false"
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN

  autoscaling:
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65

  exposed: true
  hostname: petclinic.apps.apps-crc.testing

  resources:
    requestsCpu: "250m"
    requestsMemory: "512Mi"
    limitsCpu: "1"
    limitsMemory: "1Gi"

  extraLabels:
    team: backend
    cost-center: "cc-11"
    environment: production
    app.kubernetes.io/part-of: petclinic