---
# Example 1 — minimal: just an image, operator supplies sensible defaults
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: hello-service
  namespace: default
spec:
  # nginx:latest — official Docker Hub image, always available
  image: nginx:latest
  replicas: 1
  containerPort: 80

---
# Example 2 — full-featured: autoscaling, external exposure, secrets, resource limits
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: payment-service
  namespace: production
spec:
  # podinfo — a real open-source microservice demo by Stefan Prodan, widely used in K8s demos.
  # Repo: https://github.com/stefanprodan/podinfo
  # Port: 9898  Health: GET /healthz  Ready: GET /readyz  UI: GET /
  image: ghcr.io/stefanprodan/podinfo:latest
  replicas: 2
  containerPort: 9898

  # Key/value app config mounted into the container as env vars via a ConfigMap.
  # podinfo reads PODINFO_* env vars natively; other keys are passed through.
  config:
    PODINFO_UI_COLOR: "#336699"
    PODINFO_UI_MESSAGE: "Hello from MicroService Operator"
    LOG_LEVEL: info
    CACHE_TTL_SECONDS: "300"

  # Horizontal Pod Autoscaler — scales between 2–10 pods when CPU hits 60 %
  autoscaling:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60

  # Expose the service through an Ingress (or Route on OpenShift)
  exposed: true
  hostname: payment.apps.mycluster.example.com

  # Resource sizing
  resources:
    requestsCpu: "250m"
    requestsMemory: "256Mi"
    limitsCpu: "1"
    limitsMemory: "1Gi"

  # Secrets injected as environment variables (must exist in the same namespace before applying).
  # To create test secrets: kubectl create secret generic podinfo-token --from-literal=TOKEN=abc123
  envFromSecrets:
    - podinfo-token

  # Extra labels applied to all owned resources (useful for cost allocation, etc.)
  extraLabels:
    team: payments
    cost-center: "cc-42"
    environment: production