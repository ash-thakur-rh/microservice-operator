---
# Example 1 — Spring PetClinic REST API (minimal config)
# A real Spring Boot microservice maintained by the Spring community.
# Docker Hub: https://hub.docker.com/r/springcommunity/spring-petclinic-rest
# Port: 9966 | Health: Spring Boot Actuator (/actuator/health/liveness, /actuator/health/readiness)
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: petclinic-rest
  namespace: default
spec:
  image: docker.io/springcommunity/spring-petclinic-rest:latest
  replicas: 1
  containerPort: 9966
  # Spring Boot Actuator paths are the default, so no need to set livenessPath/readinessPath here.

---
# Example 2 — Spring PetClinic REST API (full-featured)
# Same image, now with autoscaling, external exposure, config, secrets, and resource limits.
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: petclinic-rest-prod
  namespace: production
spec:
  image: docker.io/springcommunity/spring-petclinic-rest:latest
  replicas: 2
  containerPort: 9966

  # Spring Boot Actuator health paths (defaults — shown here explicitly for clarity)
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

  # Key/value config injected as environment variables via a ConfigMap.
  # Spring Boot reads SPRING_* and SERVER_* env vars automatically.
  config:
    SPRING_PROFILES_ACTIVE: production
    SERVER_SERVLET_CONTEXT_PATH: /
    SPRING_JPA_OPEN_IN_VIEW: "false"
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN

  # HPA: scale between 2–8 pods when average CPU exceeds 65 %
  autoscaling:
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65

  # Create an Ingress so the REST API is reachable outside the cluster
  exposed: true
  hostname: petclinic-api.apps.mycluster.example.com

  # Typical sizing for a Spring Boot microservice
  resources:
    requestsCpu: "250m"
    requestsMemory: "512Mi"
    limitsCpu: "1"
    limitsMemory: "1Gi"

  # Existing secrets injected as env vars (create before applying this CR):
  #   kubectl create secret generic petclinic-db-credentials \
  #     --from-literal=SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/petclinic \
  #     --from-literal=SPRING_DATASOURCE_USERNAME=petclinic \
  #     --from-literal=SPRING_DATASOURCE_PASSWORD=s3cr3t
  envFromSecrets:
    - petclinic-db-credentials

  # Extra labels for cost allocation and GitOps tooling
  extraLabels:
    team: backend
    cost-center: "cc-11"
    environment: production
    app.kubernetes.io/part-of: petclinic