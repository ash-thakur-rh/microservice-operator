---
# Example 1 — Spring PetClinic REST API without a managed database
# Uses an in-memory H2 database (default Spring profile), so no DB config needed.
# Good for local testing / demo.
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: petclinic-rest
  namespace: default
spec:
  image: docker.io/springcommunity/spring-petclinic-rest:latest
  replicas: 1
  containerPort: 9966
  # Default probe paths match Spring Boot Actuator — no override needed.

---
# Example 2 — Spring PetClinic REST API with a fully operator-managed PostgreSQL database
#
# The operator will automatically:
#   1. Generate a random password and create a Secret  "petclinic-prod-db-secret"
#   2. Create a headless Service                        "petclinic-prod-db-headless"
#   3. Create a ClusterIP Service                       "petclinic-prod-db"
#   4. Create a StatefulSet with a PVC                  "petclinic-prod-db"
#   5. Inject the DB credentials Secret into the app Deployment via envFrom
#
# No manual "kubectl create secret" required — ever.
apiVersion: example.io/v1
kind: MicroService
metadata:
  name: petclinic-prod
  namespace: production
spec:
  image: docker.io/springcommunity/spring-petclinic-rest:latest
  replicas: 2
  containerPort: 9966

  # Spring Boot Actuator health paths (shown explicitly; these are the defaults)
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness

  # Operator-provisioned PostgreSQL — no manual secret creation needed.
  # The operator creates the Secret, Services, StatefulSet, and PVC automatically.
  # Credentials are injected into the app as:
  #   SPRING_DATASOURCE_URL      = jdbc:postgresql://petclinic-prod-db:5432/petclinicdb
  #   SPRING_DATASOURCE_USERNAME = petclinic
  #   SPRING_DATASOURCE_PASSWORD = <auto-generated>
  database:
    image: docker.io/postgres:15-alpine   # official Docker Hub image
    databaseName: petclinicdb
    username: petclinic
    storageSize: 5Gi
    # storageClass: gp3   # uncomment and set for your cloud provider

  # Application-level config injected as env vars via a ConfigMap.
  # Spring Boot reads SPRING_* env vars automatically.
  config:
    SPRING_PROFILES_ACTIVE: postgresql,production
    SPRING_JPA_OPEN_IN_VIEW: "false"
    SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN

  # HPA: scale between 2–8 pods when average CPU exceeds 65 %
  autoscaling:
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65

  # Expose through an Ingress
  exposed: true
  hostname: petclinic-api.apps.mycluster.example.com

  # Resource sizing for the app Deployment (database resources are fixed in the operator)
  resources:
    requestsCpu: "250m"
    requestsMemory: "512Mi"
    limitsCpu: "1"
    limitsMemory: "1Gi"

  extraLabels:
    team: backend
    cost-center: "cc-11"
    environment: production
    app.kubernetes.io/part-of: petclinic